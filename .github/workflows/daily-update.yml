name: daily-data-update

on:
  schedule:
    # 00:30 UTC — shortly after the daily candle closes
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run data:update

      - run: npm run data:assets

      - run: npm run data:external
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - run: npm run data:fred
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - run: npm run data:derivs

      - run: npm run data:mcaps

      - run: npm run data:onchain

      - run: npm run data:compute

      - run: npm run data:compute-assets

      - run: npm run data:compute-onchain

      - name: Commit and push if data changed
        run: |
          if git diff --quiet -- data/; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "burrito-bot"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "data: daily update $(date -u +%F)"
          git push
